<div class="top-bar">
  <!-- Left: Breadcrumb -->
  <div class="breadcrumb">
    <span></span>
  </div>
  <button  class="backto" *ngIf="isPreview" (click)="onBackClick()">
  <img src="../../../../../../../assets/images/icons8-chevron-right-24.png" alt=""> Back to Editor
</button>

  <!-- Center: Device Toggle + Links -->
  <div class="center-options" *ngIf="!isPreview">
    <div class="device-toggle">
      <button title="Desktop View" (click)="onDesktopClick()">
        <img
          src="../../../../../assets/images/icons8-desktop-50.png"
          alt="desktop"
          width="28"
        />
      </button>
      <button title="Mobile View"(click)="onMobileClick()">
        <img
          src="../../../../../assets/images/icons8-cellphone-50.png"
          alt="desktop"
          width="28"
        />
      </button>
    </div>
    <div class="links">
      <button type="button" class="link-btn">My Hub</button>
      <button type="button" class="link-btn">Pro features</button>
      <button type="button" class="link-btn">Subscription</button>
    </div>
  </div>


  <!-- Right: Help + Preview -->
  <div class="right-controls" *ngIf="!isPreview">
    <button type="button" class="help-icon" title="Help" aria-label="Help">?</button>

    <button type="button" class="preview-btn" (click)="onPreviewClick()">Preview</button>

  </div>
</div>
